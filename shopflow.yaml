openapi: 3.0.0

info:
  title: ShopFlow E-commerce API
  description: APIs to build online stores, manage products, handle orders, and process payments.
  version: 1.0.0
  contact:
    name: API Support
    email: support@shopflow.com

servers:
  - url: https://api.shopflow.com/v1
    description: Production server
  - url: https://sandbox.shopflow.com/v1
    description: Sandbox for testing

tags:
  - name: Products
    description: All product management operations
  - name: Orders
    description: All order management operations

paths:
  /products:
    get:
      summary: Get all products
      description: Returns a paginated list of all products in ShopFlow.
      operationId: getAllProducts
      tags:
        - Products
      parameters:
        - name: category
          in: query
          description: Filter products by category
          required: false
          schema:
            type: string
            enum:
              - Electronics
              - Clothing
              - Books
              - Home
              - Sports

        - name: min_price
          in: query
          description: Filter products with price greater than or equal to this value
          required: false
          schema:
            type: number

        - name: max_price
          in: query
          description: Filter products with price less than or equal to this value
          required: false
          schema:
            type: number

        - name: sort
          in: query
          description: Sort products by selected field
          required: false
          schema:
            type: string
            enum:
              - price_asc
              - price_desc
              - newest
              - popular
            default: newest

        - name: in_stock
          in: query
          description: Filter only products currently in stock
          required: false
          schema:
            type: boolean
            default: true

        - name: limit
          in: query
          description: Maximum number of products to return per page
          required: false
          schema:
            type: integer
            default: 20

      responses:
        '200':
          description: A paginated list of products returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          description: Bad request — invalid filter parameters
        '401':
          description: Unauthorized — API key missing or invalid
        '500':
          description: Internal server error

    post:
      summary: Add a new product
      description: Creates a new product listing in ShopFlow.
      operationId: createProduct
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProduct'
            example:
              name: Sony WH-1000XM5 Headphones
              price: 29999
              currency: INR
              category: Electronics
              stock_quantity: 50
              sku: SONY-WH-XM5-BLK
              description: Industry leading noise cancelling headphones
              discount_percentage: 10
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request — missing or invalid fields
        '401':
          description: Unauthorized — API key missing or invalid
        '500':
          description: Internal server error

  /products/{id}:
    get:
      summary: Get a product by ID
      description: Returns a single product by its unique ID.
      operationId: getProductById
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the product
          schema:
            type: integer
      responses:
        '200':
          description: Product found and returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          description: Unauthorized — API key missing or invalid
        '404':
          description: Product not found
        '500':
          description: Internal server error

    patch:
      summary: Update a product partially
      description: Update one or more fields of an existing product.
      operationId: updateProductById
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the product to update
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProduct'
            example:
              price: 24999
              stock_quantity: 35
              discount_percentage: 15
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request — invalid fields sent
        '401':
          description: Unauthorized — API key missing or invalid
        '404':
          description: Product not found
        '500':
          description: Internal server error

    delete:
      summary: Delete a product by ID
      description: Permanently deletes a product from ShopFlow.
      operationId: deleteProductById
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the product to delete
          schema:
            type: integer
      responses:
        '200':
          description: Product deleted successfully
        '401':
          description: Unauthorized — API key missing or invalid
        '404':
          description: Product not found
        '500':
          description: Internal server error

  /orders:
    get:
      summary: Get all orders
      description: Returns a paginated list of all orders in ShopFlow.
      operationId: getAllOrders
      tags:
        - Orders
      parameters:
        - name: status
          in: query
          description: Filter orders by current status
          required: false
          schema:
            type: string
            enum:
              - pending
              - confirmed
              - shipped
              - delivered
              - cancelled
        - name: limit
          in: query
          description: Maximum number of orders to return
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A list of orders returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          description: Unauthorized — API key missing or invalid
        '500':
          description: Internal server error

    post:
      summary: Place a new order
      description: Creates a new order in ShopFlow.
      operationId: createOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewOrder'
            example:
              customer_name: Jagadisha V
              customer_email: jagadish_dummy@email.com
              product_id: 42
              quantity: 2
      responses:
        '201':
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad request — missing fields or product out of stock
        '401':
          description: Unauthorized — API key missing or invalid
        '404':
          description: Product not found
        '500':
          description: Internal server error

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the product
          example: 42
        name:
          type: string
          description: Name of the product
          example: Sony WH-1000XM5 Headphones
        description:
          type: string
          description: Detailed description of the product
          example: Industry leading noise cancelling headphones
        price:
          type: number
          format: float
          description: Price of the product
          example: 29999
        currency:
          type: string
          description: Currency of the price
          example: INR
        category:
          type: string
          description: Product category
          example: Electronics
        stock_quantity:
          type: integer
          description: Number of units available in stock
          example: 50
        sku:
          type: string
          description: Unique product identifier for inventory
          example: SONY-WH-XM5-BLK
        discount_percentage:
          type: number
          description: Discount percentage applied to the product
          example: 10
        created_at:
          type: string
          format: date-time
          description: Timestamp when the product was created
          example: "2026-03-01T10:00:00Z"

    NewProduct:
      type: object
      required:
        - name
        - price
        - category
        - stock_quantity
        - sku
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 200
          description: Name of the product
          example: Sony WH-1000XM5 Headphones
        price:
          type: number
          format: float
          minimum: 0
          description: Price of the product
          example: 29999
        currency:
          type: string
          default: INR
          enum:
            - INR
            - USD
            - EUR
            - GBP
          description: Currency of the price
        category:
          type: string
          enum:
            - Electronics
            - Clothing
            - Books
            - Home
            - Sports
          description: Product category
        stock_quantity:
          type: integer
          minimum: 0
          description: Number of units available in stock
          example: 50
        sku:
          type: string
          description: Unique product identifier for inventory
          example: SONY-WH-XM5-BLK
        description:
          type: string
          description: Detailed description of the product
          example: Industry leading noise cancelling headphones
        discount_percentage:
          type: number
          minimum: 0
          maximum: 100
          default: 0
          description: Discount percentage between 0 and 100

    Order:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the order
          example: 101
        customer_name:
          type: string
          description: Full name of the customer
          example: Jagadisha V
        customer_email:
          type: string
          format: email
          description: Email address of the customer
          example: jagadish_dummy@email.com
        product_id:
          type: integer
          description: ID of the ordered product
          example: 42
        quantity:
          type: integer
          description: Number of units ordered
          example: 2
        total_price:
          type: number
          description: Total price of the order
          example: 59998
        status:
          type: string
          enum:
            - pending
            - confirmed
            - shipped
            - delivered
            - cancelled
          description: Current status of the order
          example: confirmed
        created_at:
          type: string
          format: date-time
          description: Timestamp when the order was placed
          example: "2026-03-01T12:00:00Z"

    NewOrder:
      type: object
      required:
        - customer_name
        - customer_email
        - product_id
        - quantity
      properties:
        customer_name:
          type: string
          description: Full name of the customer
          example: Arjun Kumar
        customer_email:
          type: string
          format: email
          description: Email address of the customer
          example: arjun@email.com
        product_id:
          type: integer
          description: ID of the product to order
          example: 42
        quantity:
          type: integer
          minimum: 1
          description: Number of units to order — minimum 1
          example: 2

  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication — include in every request header

security:
  - apiKeyAuth: []